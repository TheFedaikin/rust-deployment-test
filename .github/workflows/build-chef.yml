name: "Strategy B: Cargo Chef + Thin Image"

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/thefedaikin

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-chef
        run: cargo install cargo-chef --locked

      - name: Prepare recipe
        run: cargo chef prepare --recipe-path recipe.json

      - name: Cook dependencies
        run: cargo chef cook --release --recipe-path recipe.json

      - name: Build release binary
        run: cargo build --release

      - name: Copy binary to workspace root
        run: cp target/release/axum-docker-deployment .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/bake-action@v6
        with:
          source: .
          targets: server-prebuilt
          set: |
            server-prebuilt.args.TAG=${{ github.sha }}
        env:
          TAG: ${{ github.sha }}
