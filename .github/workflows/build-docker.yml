name: "Strategy A: Multi-Stage Docker Build"

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/thefedaikin

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/bake-action@v6
        with:
          targets: server
          set: |
            server.args.TAG=${{ github.sha }}
        env:
          TAG: ${{ github.sha }}
